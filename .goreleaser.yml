version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: server
    main: ./cmd/vaultdrift
    binary: vaultdrift-server
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

  - id: cli
    main: ./cmd/vaultdrift-cli
    binary: vaultdrift-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

  - id: desktop
    main: ./cmd/vaultdrift-desktop
    binary: vaultdrift-desktop
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  github:
    owner: vaultdrift
    name: vaultdrift
  draft: false
  prerelease: auto

dockers:
  - image_templates:
      - "ghcr.io/vaultdrift/vaultdrift:{{ .Tag }}-amd64"
      - "ghcr.io/vaultdrift/vaultdrift:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: amd64

  - image_templates:
      - "ghcr.io/vaultdrift/vaultdrift:{{ .Tag }}-arm64"
      - "ghcr.io/vaultdrift/vaultdrift:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
    goos: linux
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/vaultdrift/vaultdrift:{{ .Tag }}"
    image_templates:
      - "ghcr.io/vaultdrift/vaultdrift:{{ .Tag }}-amd64"
      - "ghcr.io/vaultdrift/vaultdrift:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/vaultdrift/vaultdrift:latest"
    image_templates:
      - "ghcr.io/vaultdrift/vaultdrift:latest-amd64"
      - "ghcr.io/vaultdrift/vaultdrift:latest-arm64"
