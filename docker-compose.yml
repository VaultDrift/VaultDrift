version: '3.8'

services:
  vaultdrift:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vaultdrift
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - VAULTDRIFT_SERVER_PORT=8080
      - VAULTDRIFT_DATABASE_PATH=/data/vaultdrift.db
      - VAULTDRIFT_STORAGE_LOCAL_PATH=/data/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vaultdrift-network

  # Optional: Use with S3/MinIO backend
  minio:
    image: minio/minio:latest
    container_name: vaultdrift-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - vaultdrift-network
    profiles:
      - s3

volumes:
  minio-data:

networks:
  vaultdrift-network:
    driver: bridge
