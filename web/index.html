<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultDrift - File Manager</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/img/logo.svg">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <div class="logo">
                    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="64" height="64" rx="16" fill="#4F46E5"/>
                        <path d="M20 32L28 40L44 24" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <h1>VaultDrift</h1>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                    </div>
                    <div id="login-error" class="error-message"></div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </form>
            </div>
        </div>

        <!-- Main App Screen -->
        <div id="main-screen" class="screen">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <svg width="32" height="32" viewBox="0 0 64 64" fill="none">
                        <rect width="64" height="64" rx="16" fill="#4F46E5"/>
                        <path d="M20 32L28 40L44 24" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="app-name">VaultDrift</span>
                </div>

                <nav class="sidebar-nav">
                    <a href="#" class="nav-item active" data-view="files">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                        My Files
                    </a>
                    <a href="#" class="nav-item" data-view="shared">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        Shared
                    </a>
                    <a href="#" class="nav-item" data-view="recent">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        Recent
                    </a>
                    <a href="#" class="nav-item" data-view="trash">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        </svg>
                        Trash
                    </a>
                </nav>

                <div class="sidebar-footer">
                    <div class="storage-info">
                        <div class="storage-bar">
                            <div class="storage-used" style="width: 0%"></div>
                        </div>
                        <span class="storage-text">0 GB of 10 GB used</span>
                    </div>
                    <button id="logout-btn" class="btn btn-secondary btn-sm">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Logout
                    </button>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Toolbar -->
                <header class="toolbar">
                    <div class="breadcrumbs" id="breadcrumbs">
                        <span class="breadcrumb-item" data-folder="">My Files</span>
                    </div>

                    <div class="toolbar-actions">
                        <div class="search-box">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <path d="M21 21l-4.35-4.35"/>
                            </svg>
                            <input type="text" id="search-input" placeholder="Search files...">
                        </div>

                        <button id="new-folder-btn" class="btn btn-secondary btn-sm">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                                <line x1="12" y1="11" x2="12" y2="17"/>
                                <line x1="9" y1="14" x2="15" y2="14"/>
                            </svg>
                            New Folder
                        </button>

                        <button id="upload-btn" class="btn btn-primary btn-sm">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            Upload
                        </button>
                    </div>
                </header>

                <!-- File List -->
                <div class="file-list-container">
                    <table class="file-list" id="file-list">
                        <thead>
                            <tr>
                                <th class="col-name">Name</th>
                                <th class="col-size">Size</th>
                                <th class="col-modified">Modified</th>
                                <th class="col-actions">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="file-list-body">
                            <!-- Files will be loaded here -->
                        </tbody>
                    </table>

                    <div id="empty-state" class="empty-state hidden">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                        <p>This folder is empty</p>
                        <button class="btn btn-primary" id="empty-upload-btn">Upload Files</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="new-folder-modal" class="modal">
        <div class="modal-content">
            <h3>Create New Folder</h3>
            <input type="text" id="new-folder-name" placeholder="Folder name">
            <div class="modal-actions">
                <button class="btn btn-secondary" data-close-modal>Cancel</button>
                <button class="btn btn-primary" id="create-folder-confirm">Create</button>
            </div>
        </div>
    </div>

    <div id="share-modal" class="modal">
        <div class="modal-content">
            <h3>Share File</h3>
            <div class="share-options">
                <label>
                    <input type="checkbox" id="share-expires">
                    Expires after
                    <input type="number" id="share-expires-days" value="7" min="1" max="30"> days
                </label>
                <label>
                    <input type="checkbox" id="share-password">
                    Password protected
                    <input type="password" id="share-password-value" placeholder="Password">
                </label>
            </div>
            <div id="share-link-container" class="hidden">
                <input type="text" id="share-link" readonly>
                <button class="btn btn-secondary" id="copy-share-link">Copy</button>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" data-close-modal>Close</button>
                <button class="btn btn-primary" id="create-share-confirm">Create Link</button>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" multiple class="hidden">

    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
