apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultdrift
  labels:
    app: vaultdrift
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultdrift
  template:
    metadata:
      labels:
        app: vaultdrift
    spec:
      containers:
      - name: vaultdrift
        image: vaultdrift/vaultdrift:latest
        ports:
        - containerPort: 8443
          name: https
        env:
        - name: VAULTDRIFT_SERVER_HOST
          value: "0.0.0.0"
        - name: VAULTDRIFT_SERVER_PORT
          value: "8443"
        - name: VAULTDRIFT_DATABASE_PATH
          value: "/data/vaultdrift.db"
        - name: VAULTDRIFT_STORAGE_LOCAL_DATADIR
          value: "/data/storage"
        - name: VAULTDRIFT_AUTH_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: vaultdrift-secrets
              key: jwt-secret
        volumeMounts:
        - name: data
          mountPath: /data
        livenessProbe:
          httpGet:
            path: /health
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: vaultdrift-data
---
apiVersion: v1
kind: Service
metadata:
  name: vaultdrift
  labels:
    app: vaultdrift
spec:
  selector:
    app: vaultdrift
  ports:
  - port: 8443
    targetPort: 8443
    name: https
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultdrift-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: vaultdrift-secrets
type: Opaque
stringData:
  jwt-secret: "change-this-to-a-secure-random-string-in-production"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vaultdrift
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - vault.example.com
    secretName: vaultdrift-tls
  rules:
  - host: vault.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vaultdrift
            port:
              number: 8443
