apiVersion: apps/v1
kind: Deployment
metadata:
  name: vaultdrift
  labels:
    app: vaultdrift
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vaultdrift
  template:
    metadata:
      labels:
        app: vaultdrift
    spec:
      containers:
        - name: vaultdrift
          image: vaultdrift/vaultdrift:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: VAULTDRIFT_SERVER_PORT
              value: "8080"
            - name: VAULTDRIFT_DATABASE_PATH
              value: "/data/vaultdrift.db"
            - name: VAULTDRIFT_STORAGE_LOCAL_PATH
              value: "/data/storage"
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vaultdrift-data
---
apiVersion: v1
kind: Service
metadata:
  name: vaultdrift
  labels:
    app: vaultdrift
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: vaultdrift
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vaultdrift-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
